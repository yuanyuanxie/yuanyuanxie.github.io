<script>
window.HF_PAGE_DICT = {
  zh: {
    'h1':'全部文章',
    'c.all':'全部','c.guide':'入门路径','c.faq':'实话实说','c.tut':'Hammer 教程',
    'pg.showing':'显示','pg.of':'条，共','pg.page':'条 / 页',
    'empty':'该分类下暂无文章。',
  },
  en: {
    'h1':'All Articles',
    'c.all':'All','c.guide':'Beginner path','c.faq':'Honest FAQ','c.tut':'Hammer tutorials',
    'pg.showing':'Showing','pg.of':'of','pg.page':'/ page',
    'empty':'No articles in this category yet.',
  }
};
</script>
<script src="assets/app.js"></script>
<script>
const ARTICLES = [
  {d:'2026-07-05', cat:'faq',   zh:'家庭矿机能回本吗？说实话：几乎不能', en:'Will a home miner pay for itself? Honestly: almost never'},
  {d:'2026-07-01', cat:'faq',   zh:'挖了三年，是不是离中奖更近了？不是', en:'Mining for three years. Am I closer to winning? No'},
  {d:'2026-06-24', cat:'faq',   zh:'一台矿机一个月电费多少钱？', en:'How much electricity does one miner burn per month?'},
  {d:'2026-06-18', cat:'faq',   zh:'矿机吵吗？能放卧室吗？', en:'How loud is it? Bedroom-friendly?'},
  {d:'2026-06-10', cat:'faq',   zh:'真的有人中过奖吗？有，而且不止一次', en:'Has anyone actually won? Yes, more than once'},
  {d:'2026-06-03', cat:'faq',   zh:'同是 6 TH/s，BC 04 和 Avalon Nano 3S 怎么选？', en:'BC 04 vs Avalon Nano 3S: same hashrate, which one?'},
  {d:'2026-05-27', cat:'faq',   zh:'你家的电价适合挖矿吗？', en:'Is your electricity price fit for mining?'},
  {d:'2026-05-20', cat:'guide', zh:'挖矿到底是什么：哈希、彩票与十分钟一次的开奖', en:'What mining really is: hashes, lotteries, a draw every ten minutes'},
  {d:'2026-05-20', cat:'guide', zh:'家庭矿机 vs 工业矿机', en:'Home miners vs industrial rigs'},
  {d:'2026-05-20', cat:'guide', zh:'彩票矿机的真相', en:'The truth about lottery miners'},
  {d:'2026-05-20', cat:'guide', zh:'Solo 还是矿池？两种玩法一次讲清', en:'Solo or pool? Both games explained once'},
  {d:'2026-05-12', cat:'tut',   zh:'Hammer BC 04 设置教程：从开箱到出第一个 share', en:'Hammer BC 04 setup: from unboxing to your first share'},
  {d:'2026-05-08', cat:'tut',   zh:'Hammer DC 06 连接 Mining-Dutch 手把手教程', en:'Hammer DC 06 on Mining-Dutch, step by step'},
];
const S = { cat:'all', page:1, size:25 };

function rows(){
  return S.cat==='all' ? ARTICLES : ARTICLES.filter(a=>a.cat===S.cat);
}
function buildNav(pages){
  const nav = document.getElementById('pgNav');
  if (pages <= 1){ nav.classList.add('hidden'); nav.classList.remove('flex'); nav.innerHTML=''; return; }
  nav.classList.remove('hidden'); nav.classList.add('flex');
  let h = '<button type="button" data-pg="prev" class="btn-press w-9 h-9 border border-neutral-600 rounded-lg text-white hover:border-primary disabled:opacity-40" '+(S.page===1?'disabled':'')+'>&lt;</button>';
  for (let i=1; i<=pages; i++){
    h += '<button type="button" data-pg="'+i+'" class="btn-press num w-9 h-9 rounded-lg border '+(i===S.page?'border-primary text-primary bg-primary/10':'border-neutral-600 text-white hover:border-primary')+'">'+i+'</button>';
  }
  h += '<button type="button" data-pg="next" class="btn-press w-9 h-9 border border-neutral-600 rounded-lg text-white hover:border-primary disabled:opacity-40" '+(S.page===pages?'disabled':'')+'>&gt;</button>';
  nav.innerHTML = h;
  nav.querySelectorAll('button[data-pg]').forEach(b=>b.addEventListener('click', ()=>{
    const v = b.dataset.pg;
    if (v==='prev') S.page = Math.max(1, S.page-1);
    else if (v==='next') S.page++;
    else S.page = parseInt(v);
    render();
  }));
}
function render(){
  const all = rows();
  const pages = Math.max(1, Math.ceil(all.length / S.size));
  if (S.page > pages) S.page = pages;
  const start = (S.page-1) * S.size;
  const list = all.slice(start, start + S.size);
  document.getElementById('pgRange').textContent = all.length ? (start+1)+'-'+(start+list.length) : '0';
  document.getElementById('pgTotal').textContent = all.length;
  const sel = document.getElementById('pgSize');
  sel.innerHTML = [25,50,100].map(n=>'<option value="'+n+'"'+(S.size===n?' selected':'')+'>'+n+' '+t('pg.page')+'</option>').join('');
  buildNav(pages);
  document.getElementById('list').innerHTML = list.length ? list.map(a=>
    '<li class="border-b hairline"><a href="article.html" class="flex flex-wrap items-baseline gap-x-4 gap-y-1 py-4 group">'+
    '<span class="num text-xs text-neutral-600 shrink-0 w-24">'+a.d+'</span>'+
    '<span class="text-xs text-neutral-500 border border-neutral-700 rounded-full px-2.5 py-0.5 shrink-0">'+t('c.'+a.cat)+'</span>'+
    '<span class="text-white group-hover:text-primary">'+(HF_LANG==='en'?a.en:a.zh)+'</span>'+
    '</a></li>'
  ).join('') : '<li class="py-10 text-center text-neutral-500">'+t('empty')+'</li>';
}
document.querySelectorAll('.catBtn').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.catBtn').forEach(x=>{
      x.classList.remove('border-primary','text-primary'); x.classList.add('border-neutral-600'); x.setAttribute('aria-pressed','false');
    });
    b.classList.add('border-primary','text-primary'); b.classList.remove('border-neutral-600'); b.setAttribute('aria-pressed','true');
    S.cat = b.dataset.cat; S.page = 1; render();
  });
});
document.getElementById('pgSize').addEventListener('change', e=>{ S.size = parseInt(e.target.value)||25; S.page = 1; render(); });
window.onLangChange = render;
</script>
</body>
