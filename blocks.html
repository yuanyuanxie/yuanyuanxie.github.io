    'tab.btc':'BTC Hall','tab.scrypt':'DOGE / LTC Wins','pg.showing':'Showing','pg.of':'of','pg.page':'/ page',
    'filtered':'14 industrial or rented-hashrate blocks filtered out this month. See "How we track" below.',
    'sc.c1':'Date','sc.c2':'Coin','sc.c3':'Block','sc.c4':'Reward','sc.c5':'Est. hashrate',
    'how.h':'How we track',
    'how.p':'Data updates every 5 minutes from on-chain solo-pool records. Rented hashrate and industrial farms are filtered out; hashrates are estimates based on public chain data.',
  }
};

<script src="assets/app.js"></script>
<script>
/* BTC 墙数据（区块高度/日期/矿池/奖励/估算算力，均为可自动获取字段） */
const BTC_WINS = [
  {n:137, h:'#955,703', d:'2026-06-27', pool:'CKPool Solo',  btc:'3.1553', usd:'$198,589',  hash:'111 PH/s'},
  {n:129, h:'#920,440', d:'2025-10-27', pool:'Public Pool',  btc:'~3.14',  usd:'~$342,000', hash:'~4.2 TH/s'},
  {n:112, h:'#889,975', d:'2025-03-23', pool:'CKPool Solo',  btc:'3.149',  usd:'~$265,000', hash:'~1.2 TH/s'},
  {n:109, h:'#887,212', d:'2025-03-10', pool:'CKPool Solo',  btc:'3.15',   usd:'~$258,000', hash:'~3.3 TH/s'},
  {n:104, h:'#881,423', d:'2025-01-30', pool:'CKPool Solo',  btc:'3.15',   usd:'~$326,000', hash:'~3 TH/s'},
  {n:86,  h:'#853,742', d:'2024-07-24', pool:'CKPool Solo',  btc:'3.15',   usd:'~$206,000', hash:'~0.5 TH/s'},
];
/* Scrypt 墙（演示） */
const SC_WINS = [
  {d:'2026-07-02', coin:'DOGE', h:'#5,483,120', r:'10,000 DOGE ≈ $1,420', hash:'~2.1 GH/s'},
  {d:'2026-06-28', coin:'LTC',  h:'#2,914,552', r:'6.25 LTC ≈ $529',     hash:'~5.3 GH/s'},
  {d:'2026-06-24', coin:'DOGE', h:'#5,471,904', r:'10,000 DOGE ≈ $1,405', hash:'~700 MH/s'},
  {d:'2026-06-19', coin:'DOGE', h:'#5,465,001', r:'10,000 DOGE ≈ $1,388', hash:'~330 MH/s'},
  {d:'2026-06-11', coin:'LTC',  h:'#2,908,713', r:'6.25 LTC ≈ $520',     hash:'~2.2 GH/s'},
];

let ACTIVE = 'btc';
const WALL_STATS = {
  btc: { n:'137',   won:'$41M+',  min:'654<span class="text-sm"> GH/s</span>' },
  scrypt: { n:'2,483', won:'$3.4M+', min:'105<span class="text-sm"> MH/s</span>' },
};
function renderStats(){
  const s = WALL_STATS[ACTIVE];
  document.getElementById('st1Val').textContent = s.n;
  document.getElementById('st2Val').textContent = s.won;
  document.getElementById('st3Val').innerHTML = s.min;
}
const PG = { btc:{page:1,size:12}, sc:{page:1,size:25} };
function buildNav(navId, st, pages){
  const nav = document.getElementById(navId);
  if (pages <= 1){ nav.classList.add('hidden'); nav.classList.remove('flex'); nav.innerHTML=''; return; }
  nav.classList.remove('hidden'); nav.classList.add('flex');
  let h = '<button type="button" data-pg="prev" class="btn-press w-9 h-9 border border-neutral-600 rounded-lg text-white hover:border-primary disabled:opacity-40" '+(st.page===1?'disabled':'')+'>&lt;</button>';
  for (let i=1; i<=pages; i++){
    h += '<button type="button" data-pg="'+i+'" class="btn-press num w-9 h-9 rounded-lg border '+(i===st.page?'border-primary text-primary bg-primary/10':'border-neutral-600 text-white hover:border-primary')+'">'+i+'</button>';
  }
  h += '<button type="button" data-pg="next" class="btn-press w-9 h-9 border border-neutral-600 rounded-lg text-white hover:border-primary disabled:opacity-40" '+(st.page===pages?'disabled':'')+'>&gt;</button>';
  nav.innerHTML = h;
  nav.querySelectorAll('button[data-pg]').forEach(b=>b.addEventListener('click', ()=>{
    const v = b.dataset.pg;
    if (v==='prev') st.page = Math.max(1, st.page-1);
    else if (v==='next') st.page = Math.min(pages, st.page+1);
    else st.page = parseInt(v);
    render();
  }));
}
function paginate(list, st, rangeId, totalId, navId){
  const pages = Math.max(1, Math.ceil(list.length / st.size));
  if (st.page > pages) st.page = pages;
  const start = (st.page-1) * st.size;
  const slice = list.slice(start, start + st.size);
  document.getElementById(rangeId).textContent = list.length ? (start+1)+'-'+(start+slice.length) : '0';
  document.getElementById(totalId).textContent = list.length;
  buildNav(navId, st, pages);
  return slice;
}
function render(){
  renderStats();
  // BTC 墙（最新在前）
  const bList = paginate(BTC_WINS, PG.btc, 'btcRange', 'btcTotal', 'btcNav');
  document.getElementById('btcCards').innerHTML = bList.map(w=>
    '<article class="bg-panel border hairline rounded-lg p-5 flex flex-col">'+
      '<div class="flex items-baseline justify-between"><p class="num text-xs text-neutral-500">No.'+w.n+'</p><p class="text-xs text-neutral-500">'+w.d+'</p></div>'+
      '<h3 class="font-header text-lg text-white mt-2">'+w.h+' <span class="text-neutral-500 text-sm font-body">'+w.pool+'</span></h3>'+
      '<div class="mt-auto pt-4 flex items-baseline justify-between border-t hairline">'+
      '<span class="num text-primary font-bold">'+w.btc+' BTC</span>'+
      '<span class="num text-xs text-neutral-500">'+w.usd+' · '+w.hash+'</span></div></article>'
  ).join('');
  // Scrypt 墙
  const sSel = document.getElementById('scSize');
  sSel.innerHTML = [25,50,100].map(n=>'<option value="'+n+'"'+(PG.sc.size===n?' selected':'')+'>'+n+' '+t('pg.page')+'</option>').join('');
  const sList = paginate(SC_WINS, PG.sc, 'scRange', 'scTotal', 'scNav');
  document.getElementById('scRows').innerHTML = sList.map(w=>
    '<tr class="border-b hairline"><td class="py-3 pr-4">'+w.d+'</td>'+
    '<td class="py-3 pr-4 '+(w.coin==='DOGE'?'text-gold':'text-neutral-300')+'">'+w.coin+'</td>'+
    '<td class="py-3 pr-4 text-white">'+w.h+'</td><td class="py-3 pr-4 text-primary">'+w.r+'</td>'+
    '<td class="py-3">'+w.hash+'</td></tr>').join('');
}
document.getElementById('scSize').addEventListener('change', e=>{ PG.sc.size = parseInt(e.target.value)||25; PG.sc.page = 1; render(); });
document.querySelectorAll('.wtab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.wtab').forEach(x=>{
      const on = x===tab;
      x.setAttribute('aria-selected', on);
      x.classList.toggle('text-primary', on); x.classList.toggle('border-primary', on); x.classList.toggle('font-semibold', on);
      x.classList.toggle('text-neutral-400', !on); x.classList.toggle('border-transparent', !on);
    });
    ['btc','scrypt'].forEach(k=> document.getElementById('wall-'+k).classList.toggle('hidden', k!==tab.dataset.tab));
    ACTIVE = tab.dataset.tab; renderStats();
  });
});
window.onLangChange = render;
</script>
