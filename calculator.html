<script>
const state = { mode:'btc', miner:'bc04', qty:1, custom:null, scryptCoin:'doge' };
const $ = id => document.getElementById(id);
const HM = {};
HF_MINERS.forEach(m => HM[m.id] = m);
const HAMMER_IDS = HF_MINERS.slice(0,6).map(m=>m.id);

function renderMiners(){
  const grid = $('minerGrid'); grid.innerHTML = '';
  const algo = state.mode==='btc' ? 'sha256' : 'scrypt';
  HAMMER_IDS.map(id=>HM[id]).filter(m=>m.algo===algo).forEach(m=>{
    const on = state.miner===m.id && state.custom===null;
    const b = document.createElement('button');
    b.type='button';
    b.className = 'btn-press border rounded-full px-4 py-2 text-sm ' + (on ? 'border-primary bg-primary/10 text-primary' : 'border-neutral-700 text-white hover:border-primary hover:text-primary');
    b.setAttribute('aria-pressed', on);
    b.innerHTML = '<span class="font-header">'+m.model+'</span> <span class="num text-xs '+(on?'text-primary/70':'text-neutral-500')+'">'+m.hDisp+'</span>';
    b.addEventListener('click', ()=>{ state.miner=m.id; state.custom=null; $('customH').value=''; renderInputs(); });
    grid.appendChild(b);
  });
}
function totalTHs(){
  if(state.custom!==null) return state.custom*state.qty;
  const m = HM[state.miner];
  return (m.algo==='sha256' ? m.ths : m.mhs/1e6) * state.qty;
}
function calc(){
  const tot = totalTHs();
  let perBlock, bpd, rewardTxt, coin;
  if(state.mode==='btc'){
    perBlock = HF_SNAPSHOT.btcNetTHs/tot; bpd = 144; coin='(BTC)';
    rewardTxt = HF_SNAPSHOT.btcReward+' BTC ≈ $'+Math.round(HF_SNAPSHOT.btcReward*HF_SNAPSHOT.btcPrice).toLocaleString('en-US');
  } else if(state.scryptCoin==='doge'){
    perBlock = HF_SNAPSHOT.dogeNetMHs/(tot*1e6); bpd = 1440; coin='(DOGE)';
    rewardTxt = HF_SNAPSHOT.dogeReward.toLocaleString('en-US')+' DOGE ≈ $'+Math.round(HF_SNAPSHOT.dogeReward*HF_SNAPSHOT.dogePrice).toLocaleString('en-US');
  } else {
    perBlock = HF_SNAPSHOT.ltcNetMHs/(tot*1e6); bpd = 576; coin='(LTC)';
    rewardTxt = HF_SNAPSHOT.ltcReward+' LTC ≈ $'+Math.round(HF_SNAPSHOT.ltcReward*HF_SNAPSHOT.ltcPrice).toLocaleString('en-US');
  }
  const p = 1/perBlock, over = n => 1/(1-Math.pow(1-p,n));
  return { perBlock, coin, rewardTxt, day:over(bpd), month:over(bpd*30), year:over(bpd*365), expDays:perBlock/bpd };
}
const CMP_LADDER = [
  {o:12500,     k:'ev.1'},
  {o:649740,    k:'ev.2'},
  {o:1200000,   k:'ev.3'},
  {o:45057474,  k:'ev.4'},
  {o:292201338, k:'ev.5'},
];
function cmpSentence(odds){
  if (odds < 16384) return t('cmp.flip').replace('{n}', Math.max(1, Math.round(Math.log2(odds))));
  let best = CMP_LADDER[0], bd = Infinity;
  CMP_LADDER.forEach(e=>{ const d = Math.abs(Math.log(odds/e.o)); if(d<bd){ bd=d; best=e; } });
  const ratio = best.o / odds, ev = t(best.k);
  if (ratio >= 1.5)  return t('cmp.better').replace('{x}', Math.round(ratio).toLocaleString('en-US')).replace('{event}', ev);
  if (ratio <= 0.67) return t('cmp.worse').replace('{x}', Math.round(1/ratio).toLocaleString('en-US')).replace('{event}', ev);
  return t('cmp.same').replace('{event}', ev);
}
function renderInputs(){
  renderMiners();
  const tot = totalTHs();
  $('resHash').textContent = state.mode==='btc' ? tot.toFixed(tot<10?1:0)+' TH/s' : Math.round(tot*1e6).toLocaleString('en-US')+' MH/s';
  $('mergedNote').classList.toggle('hidden', state.mode!=='scrypt');
}
function renderResults(){
  const r = calc();
  $('resCoin').textContent = r.coin;
  const setV = (id,v)=>{ const el=$(id); if(el.textContent!==v){ el.textContent=v; el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse'); } };
  setV('oddsBlock', fmtOdds(r.perBlock));
  setV('oddsDay', fmtOdds(r.day));
  setV('oddsMonth', fmtOdds(r.month));
  setV('oddsYear', fmtOdds(r.year));
  $('reward').textContent = r.rewardTxt;
  const y = r.expDays/365;
  $('expTime').textContent = y>=1 ? Math.round(y).toLocaleString('en-US')+' '+t('u.year') : Math.round(r.expDays)+' '+t('u.day');
  const cmpEl = $('cmpText'), cmpHtml = cmpSentence(r.day);
  if (cmpEl.innerHTML !== cmpHtml){ cmpEl.innerHTML = cmpHtml; cmpEl.classList.remove('pulse'); void cmpEl.offsetWidth; cmpEl.classList.add('pulse'); }
}
function render(){ renderInputs(); renderResults(); }
document.querySelectorAll('.mode-tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.mode-tab').forEach(x=>{
      const on = x===tab;
      x.setAttribute('aria-selected', on);
      x.classList.toggle('text-primary', on); x.classList.toggle('border-primary', on); x.classList.toggle('font-semibold', on);
      x.classList.toggle('text-neutral-400', !on); x.classList.toggle('border-transparent', !on);
    });
    const mode = tab.dataset.mode;
    if(mode==='pool'){ $('panel-calc').classList.add('hidden'); $('panel-pool').classList.remove('hidden'); return; }
    $('panel-pool').classList.add('hidden'); $('panel-calc').classList.remove('hidden');
    state.mode = mode; state.custom = null; $('customH').value='';
    state.miner = mode==='btc' ? 'bc04' : 'dc06';
    render();
  });
});
$('customH').addEventListener('input', e=>{
  const v = parseFloat(e.target.value);
  state.custom = (isNaN(v)||v<=0) ? null : v*parseFloat($('customUnit').value);
  renderInputs();
});
$('customUnit').addEventListener('change', ()=> $('customH').dispatchEvent(new Event('input')));
$('qtyPlus').addEventListener('click', ()=>{ state.qty=Math.min(99,state.qty+1); $('qty').textContent=state.qty; renderInputs(); });
$('qtyMinus').addEventListener('click', ()=>{ state.qty=Math.max(1,state.qty-1); $('qty').textContent=state.qty; renderInputs(); });
$('coinDoge').addEventListener('click', ()=>{ state.scryptCoin='doge'; swapCoin(true); });
$('coinLtc').addEventListener('click',  ()=>{ state.scryptCoin='ltc';  swapCoin(false); });
function swapCoin(doge){
  $('coinDoge').className = 'btn-press text-xs rounded-full px-4 py-1.5 border ' + (doge?'border-primary text-primary':'border-neutral-600 text-neutral-300 hover:border-primary hover:text-primary');
  $('coinLtc').className  = 'btn-press text-xs rounded-full px-4 py-1.5 border ' + (!doge?'border-primary text-primary':'border-neutral-600 text-neutral-300 hover:border-primary hover:text-primary');
  $('coinDoge').setAttribute('aria-pressed', doge); $('coinLtc').setAttribute('aria-pressed', !doge);
}
$('calcBtn').addEventListener('click', renderResults);
$('poolQuery').addEventListener('click', ()=>{ $('poolHash').textContent='7.42 TH/s'; $('poolWorkers').textContent=t('pool.r2'); $('poolOdds').textContent='1 in 878,000'; });
document.querySelectorAll('.pool-srv').forEach(b=>b.addEventListener('click', ()=>{
  document.querySelectorAll('.pool-srv').forEach(x=>{ x.classList.remove('border-primary','text-primary'); x.classList.add('border-neutral-600'); x.setAttribute('aria-pressed','false'); });
  b.classList.add('border-primary','text-primary'); b.classList.remove('border-neutral-600'); b.setAttribute('aria-pressed','true');
}));
window.onLangChange = render;
render();
</script>
