<script>
window.HF_PAGE_DICT = {
  zh: {
    'h1':'家用矿机对比表',
    'f.brand':'品牌','f.algo':'算法','f.search':'搜索机型…','f.all':'全部','f.reset':'重置',
    'f.none':'没有符合条件的机型。','pg.showing':'显示','pg.of':'条，共','pg.page':'条 / 页','p.kwh':'电价',
    'c.model':'机型','c.algo':'算法','c.hash':'算力','c.power':'功耗','c.noise':'噪音','c.price':'参考价',
    'c.rel':'发布日期','c.cost':'月电费',
    'silent':'近无声',
  },
  en: {
    'h1':'Home Miner Comparison',
    'f.brand':'Brand','f.algo':'Algorithm','f.search':'Search models...','f.all':'All','f.reset':'Reset',
    'f.none':'No miners match these filters.','pg.showing':'Showing','pg.of':'of','pg.page':'/ page','p.kwh':'Electricity',
    'c.model':'Model','c.algo':'Algorithm','c.hash':'Hashrate','c.power':'Power','c.noise':'Noise','c.price':'Price',
    'c.rel':'Released','c.cost':'Monthly power',
    'silent':'near silent',
  }
};
</script>
<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script>
const S = { brand:'all', algo:'all', q:'', kwh:0.10, sort:'rel', dir:-1, page:1, pageSize:25 };
function ghs(m){ return m.algo==='sha256' ? m.ths*1000 : m.mhs/1000; }
const BRANDS = [...new Set(HF_MINERS.map(m=>m.brand))];

function buildFilters(){
  const opt = (v,txt,sel)=>'<option value="'+v+'"'+(sel?' selected':'')+'>'+txt+'</option>';
  document.getElementById('fBrand').innerHTML = opt('all',t('f.all'),S.brand==='all') + BRANDS.map(b=>opt(b,b,S.brand===b)).join('');
  document.getElementById('fAlgo').innerHTML = opt('all',t('f.all'),S.algo==='all') + opt('sha256','SHA-256 (BTC)',S.algo==='sha256') + opt('scrypt','Scrypt (DOGE/LTC)',S.algo==='scrypt');
}
function rows(){
  let list = HF_MINERS.slice();
  if (S.brand!=='all') list = list.filter(m=>m.brand===S.brand);
  if (S.algo!=='all')  list = list.filter(m=>m.algo===S.algo);
  if (S.q) {
    const norm = s => s.toLowerCase().replace(/[\s-]+/g,'');
    const q = norm(S.q);
    list = list.filter(m => norm(m.brand+m.model).includes(q));
  }
  const val = m => ({
    hash: ghs(m), watts: m.watts, noise: m.noise, price: m.price,
    rel: parseInt(m.rel.replace(/-/g,'')), cost: minerMonthlyCost(m,S.kwh),
  })[S.sort];
  list.sort((a,b)=> (val(a)-val(b)) * S.dir );
  return list;
}
function renderPager(total, pages, start, shown){
  document.getElementById('pgRange').textContent = total ? (start+1)+'-'+(start+shown) : '0';
  document.getElementById('pgTotal').textContent = total;
  const sel = document.getElementById('pgSize');
  sel.innerHTML = [25,50,100].map(n=>'<option value="'+n+'"'+(S.pageSize===n?' selected':'')+'>'+n+' '+t('pg.page')+'</option>').join('');
  const nav = document.getElementById('pgNav');
  if (pages <= 1){ nav.classList.add('hidden'); nav.classList.remove('flex'); nav.innerHTML=''; return; }
  nav.classList.remove('hidden'); nav.classList.add('flex');
  let h = '<button type="button" data-pg="prev" class="btn-press w-9 h-9 border border-neutral-600 rounded-lg text-white hover:border-primary disabled:opacity-40" '+(S.page===1?'disabled':'')+'>&lt;</button>';
  for (let i=1; i<=pages; i++){
    h += '<button type="button" data-pg="'+i+'" class="btn-press num w-9 h-9 rounded-lg border '+(i===S.page?'border-primary text-primary bg-primary/10':'border-neutral-600 text-white hover:border-primary')+'">'+i+'</button>';
  }
  h += '<button type="button" data-pg="next" class="btn-press w-9 h-9 border border-neutral-600 rounded-lg text-white hover:border-primary disabled:opacity-40" '+(S.page===pages?'disabled':'')+'>&gt;</button>';
  nav.innerHTML = h;
  nav.querySelectorAll('button[data-pg]').forEach(b=>b.addEventListener('click', ()=>{
    const v = b.dataset.pg;
    if (v==='prev') S.page = Math.max(1, S.page-1);
    else if (v==='next') S.page = Math.min(pages, S.page+1);
    else S.page = parseInt(v);
    render();
  }));
}
function render(){
  buildFilters();
  const all = rows();
  const pages = Math.max(1, Math.ceil(all.length / S.pageSize));
  if (S.page > pages) S.page = pages;
  const start = (S.page-1) * S.pageSize;
  const list = all.slice(start, start + S.pageSize);
  renderPager(all.length, pages, start, list.length);
  document.getElementById('rows').innerHTML = list.length ? list.map(m=>{
    const noise = m.noise===0 ? t('silent') : m.noiseTxt;
    const name = (m.hammer?'<span class="text-primary font-semibold">':'<span class="text-white">')+m.brand+' '+m.model+'</span>';
    return '<tr class="border-b hairline cursor-pointer hover:bg-white/5'+(m.hammer?' bg-primary/5':'')+'" onclick="location.href=\'miner.html?id='+m.id+'\'">'+
      '<td class="py-3 pr-4 font-body">'+name+'</td>'+
      '<td class="py-3 pr-4 text-neutral-400 font-body">'+(m.algo==='sha256'?'SHA-256':'Scrypt')+'</td>'+
      '<td class="py-3 pr-4 text-white">'+m.hDisp+'</td>'+
      '<td class="py-3 pr-4">'+m.watts+'W</td>'+
      '<td class="py-3 pr-4">'+noise+'</td>'+
      '<td class="py-3 pr-4">$'+m.price+'</td>'+
      '<td class="py-3 pr-4">'+m.rel+'</td>'+
      '<td class="py-3">$'+minerMonthlyCost(m,S.kwh).toFixed(1)+'</td></tr>';
  }).join('') : '<tr><td colspan="8" class="py-10 text-center text-neutral-500 font-body">'+t('f.none')+'</td></tr>';
}
document.querySelectorAll('th[data-sort]').forEach(th=>{
  th.addEventListener('click', ()=>{
    const k = th.dataset.sort;
    if (S.sort===k) S.dir*=-1; else { S.sort=k; S.dir = (k==='rel')?-1:1; }
    S.page=1; render();
  });
});
document.getElementById('fBrand').addEventListener('change', e=>{ S.brand=e.target.value; S.page=1; render(); });
document.getElementById('fAlgo').addEventListener('change', e=>{ S.algo=e.target.value; S.page=1; render(); });
document.getElementById('fSearch').addEventListener('input', e=>{ S.q = e.target.value.trim(); S.page=1; render(); });
document.getElementById('kwh').addEventListener('input', e=>{
  const v = parseFloat(e.target.value); S.kwh = (isNaN(v)||v<0)?0.10:v; render();
});
document.getElementById('pgSize').addEventListener('change', e=>{ S.pageSize = parseInt(e.target.value)||25; S.page=1; render(); });
document.getElementById('fReset').addEventListener('click', ()=>{
  S.brand='all'; S.algo='all'; S.q=''; S.kwh=0.10; S.sort='rel'; S.dir=-1; S.page=1; S.pageSize=25;
  document.getElementById('kwh').value='0.10';
  document.getElementById('fSearch').value='';
  render();
});
window.onLangChange = render;
</script>
