    'odds.cost':'Monthly power ($0.10/kWh)','odds.hpd':'Hash per $','odds.btn':'Open in calculator',

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script>
const id = new URLSearchParams(location.search).get('id') || 'bc04';
const m = HF_MINERS.find(x=>x.id===id) || HF_MINERS[1];
function oddsOverDays(m, days){
  const perBlock = m.algo==='sha256' ? HF_SNAPSHOT.btcNetTHs/m.ths : HF_SNAPSHOT.dogeNetMHs/m.mhs;
  const bpd = m.algo==='sha256' ? 144 : 1440;
  const p = 1/perBlock;
  return 1/(1-Math.pow(1-p, bpd*days));
}
function render(){
  document.title = m.brand+' '+m.model+' | HammerFans';
  document.getElementById('crumb').textContent = m.brand+' '+m.model;
  document.getElementById('dBrand').textContent = m.brand + (m.hammer ? (HF_LANG==='zh'?'（本站主队）':' (home team)') : '');
  document.getElementById('dModel').textContent = m.model;
  document.getElementById('dDesc').textContent = HF_LANG==='en' ? m.en : m.zh;
  document.getElementById('dHash').textContent = m.hDisp;
  document.getElementById('dPower').textContent = m.watts+'W';
  document.getElementById('dAlgo').textContent = m.algo==='sha256'?'SHA-256':'Scrypt';
  document.getElementById('dNoise').textContent = m.noise===0 ? t('silent') : m.noiseTxt;
  document.getElementById('dNet').textContent = (HF_LANG==='en'&&m.netEn)?m.netEn:m.net;
  document.getElementById('dPrice').textContent = '$'+m.price;
  const coin = m.algo==='scrypt' ? ' (DOGE)' : '';
  document.getElementById('oDay').textContent = fmtOdds(oddsOverDays(m,1)) + coin;
  document.getElementById('oMonth').textContent = fmtOdds(oddsOverDays(m,30));
  document.getElementById('oYear').textContent = fmtOdds(oddsOverDays(m,365));
  document.getElementById('oCost').textContent = '$'+minerMonthlyCost(m,0.10).toFixed(1);
  document.getElementById('oHpd').textContent = minerHashPerDollar(m).toFixed(1)+' GH/$';
  // 同算法对比
  const peers = HF_MINERS.filter(x=>x.algo===m.algo && x.id!==m.id).slice(0,4);
  document.getElementById('vsList').innerHTML = peers.map(p=>
    '<li class="flex items-baseline justify-between gap-4 border-b hairline pb-2">'+
    '<a href="miner.html?id='+p.id+'" class="'+(p.hammer?'text-primary':'text-white')+' hover:underline">'+p.brand+' '+p.model+'</a>'+
    '<span class="num text-xs text-neutral-500">'+p.hDisp+' · '+fmtOdds(minerDailyOdds(p))+' '+t('vs.day')+'</span></li>'
  ).join('');
}
window.onLangChange = render;
</script>
